<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DomoDomo - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages redirection fallback
      var l = window.location;
      var path = l.pathname.slice(1);
      var query = l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '';
      var hash = l.hash;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?p=' + path.replace(/&/g, '~and~') + query + hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
