version: '3.8'

name: domodomo
services:
  domodomo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: domodomo:latest
    ports:
      # Bind exclusively to localhost for security
      - "127.0.0.1:5173:5173"
      - "127.0.0.1:8000:8000"
    environment:
      - HOST=0.0.0.0
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ..:/app
      # Protect container dependencies and build artifacts from host overwrites
      - /app/node_modules
      - /app/mcp-server/node_modules
      - /app/mcp-server/dist
      - /app/.venv
